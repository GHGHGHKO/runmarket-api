name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: self-hosted
    permissions:
      contents: write

    steps:
      - name: Checkout API
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Generate image tag
        id: tag
        run: echo "TAG=$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push with Jib
        run: |
          ./gradlew jib \
            -Djib.to.tags=${{ steps.tag.outputs.TAG }}

      - name: Checkout IAC
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/iac
          token: ${{ secrets.IAC_REPO_TOKEN }}
          path: iac

      - name: Update image tag in values.yaml
        run: |
          sed -i 's/^  tag: .*/  tag: "${{ steps.tag.outputs.TAG }}"/' iac/helm/runmarket/values.yaml

      - name: Commit and push IAC
        run: |
          cd iac
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/runmarket/values.yaml
          git commit -m "chore: update runmarket-api image tag to ${{ steps.tag.outputs.TAG }}"
          git push

      - name: Helm upgrade
        run: |
          helm upgrade runmarket ./iac/helm/runmarket -n applications

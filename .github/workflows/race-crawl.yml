name: Trigger Race Crawl Job

on:
  schedule:
    - cron: '0 15 * * *'  # 매일 자정 KST (UTC+9)
  workflow_dispatch:

concurrency:
  group: race-crawl
  cancel-in-progress: false

jobs:
  raceCrawlJob:
    runs-on: self-hosted

    steps:
      - name: Checkout IAC
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/iac
          token: ${{ secrets.IAC_REPO_TOKEN }}

      - name: Create batch Job
        run: |
          JOB_NAME=$(helm template runmarket ./helm/runmarket \
            --set batch.enabled=true \
            -s templates/race-crawl-job.yaml \
            -n applications \
            | kubectl create -f - -o jsonpath='{.metadata.name}')
          echo "JOB_NAME=$JOB_NAME" >> $GITHUB_ENV

      - name: Wait for Job completion
        run: |
          kubectl wait job/$JOB_NAME \
            --for=condition=complete \
            --timeout=30m \
            -n applications

      - name: Delete Job on success
        run: kubectl delete job $JOB_NAME -n applications

      - name: Print Job logs
        if: failure()
        run: |
          POD_NAME=$(kubectl get pods -n applications \
            -l job-name=$JOB_NAME \
            -o jsonpath='{.items[0].metadata.name}')

          echo "=== Logs for $POD_NAME ==="
          kubectl logs $POD_NAME -n applications

name: Trigger Race Crawl Job

on:
  schedule:
    - cron: '0 15 * * *'  # 매일 자정 KST (UTC+9)
  workflow_dispatch:

concurrency:
  group: race-crawl
  cancel-in-progress: false

jobs:
  raceCrawlJob:
    runs-on: self-hosted

    steps:
      - name: Checkout IAC
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/iac
          token: ${{ secrets.IAC_REPO_TOKEN }}

      - name: Create batch Job
        run: |
          RELEASE="race-crawl-$(date +%Y%m%d%H%M%S)"
          helm install $RELEASE ./helm/runmarket-batch -n applications
          echo "RELEASE=$RELEASE" >> $GITHUB_ENV

      - name: Wait for Job completion
        run: |
          kubectl wait job/$RELEASE \
            --for=condition=complete \
            --timeout=30m \
            -n applications

      - name: Delete Job on success
        run: helm uninstall $RELEASE -n applications

      - name: Print Job logs
        if: failure()
        run: |
          POD_NAME=$(kubectl get pods -n applications \
            -l job-name=$RELEASE \
            -o jsonpath='{.items[0].metadata.name}')

          echo "=== Logs for $POD_NAME ==="
          kubectl logs $POD_NAME -n applications

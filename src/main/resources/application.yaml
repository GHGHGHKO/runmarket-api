spring:
  application:
    name: api
  mail:
    host: live.smtp.mailtrap.io
    port: 587
    username: api
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: ${JWT_SECRET}
  expiration: 60000

app:
  base-url: https://www.runmarket.cc
  mail:
    from: noreply@mail.runmarket.cc
  verification:
    token-expiry-minutes: 30
  admin:
    email: ${ADMIN_EMAIL}
    password: ${ADMIN_PASSWORD}

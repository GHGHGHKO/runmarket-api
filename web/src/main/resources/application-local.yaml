spring:
  datasource:
    url: jdbc:h2:mem:runmarket;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: runmarket-secret-key-must-be-at-least-256-bits-long
  expiration: 86400000

logging:
  level:
    org.hibernate.orm.jdbc.bind: TRACE

turnstile:
  secret-key: 1x0000000000000000000000000000000AA

app:
  base-url: http://localhost:8080
  admin:
    email: admin@runmarket.cc
    password: p@ssword
